<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
    body {
        margin: 0;
        background: black;
        color: white;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: sans-serif;
    }

    .box {
        text-align: center;
    }

    input {
        padding: 10px;
        font-size: 18px;
        border-radius: 5px;
        border: none;
        outline: none;
    }

    button {
        padding: 10px 20px;
        font-size: 18px;
        margin-top: 10px;
        border: none;
        border-radius: 5px;
        background: #444;
        color: white;
    }

    #error {
        color: red;
        margin-top: 10px;
        height: 20px;
    }
</style>
</head>

<body>

<div class="box">
    <h2>Enter Password</h2>
    <input type="password" id="pw" placeholder="Password">
    <br>
    <button onclick="login()">Login</button>
    <div id="error"></div>
</div>

<script>
    const CORRECT_PASSWORD = "1113";  // ← 好きなパスワードに変更

    function login() {
        const input = document.getElementById("pw").value;

        if (input === CORRECT_PASSWORD) {
            window.location.href = "viewer_program.html";
        } else {
            document.getElementById("error").textContent = "Incorrect password";
        }
    }

    // Enterキーでもログイン
    document.getElementById("pw").addEventListener("keypress", function(e) {
        if (e.key === "Enter") login();
    });
</script>

</body>
</html>
