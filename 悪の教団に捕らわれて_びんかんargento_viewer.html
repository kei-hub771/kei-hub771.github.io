
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: black;
        overflow: hidden;
    }

    #viewer {
        width: 100%;
        height: 100%;
        background-size: contain;     /* ← 見切れない最大サイズ */
        background-position: center;  /* ← 常に中央 */
        background-repeat: no-repeat; /* ← 繰り返しなし */
    }
</style>
</head>

<body>

<img id="viewer" src="悪の教団に捕らわれて_びんかんargento//page_1.jpg">

<script>
    const pages = ['悪の教団に捕らわれて_びんかんargento//page_1.jpg', '悪の教団に捕らわれて_びんかんargento//page_2.jpg', '悪の教団に捕らわれて_びんかんargento//page_3.jpg', '悪の教団に捕らわれて_びんかんargento//page_4.jpg'];
    let index = 0;

    document.body.addEventListener("click", () => {
        index = (index + 1) % pages.length;
        document.getElementById("viewer").src = pages[index];
    });
</script>

</body>
</html>
