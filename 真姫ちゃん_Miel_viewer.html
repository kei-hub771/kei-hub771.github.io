
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: black;
        overflow: hidden;
    }

    #viewer {
        width: 100%;
        height: 100%;
        background-size: contain;     /* ← 見切れない最大サイズ */
        background-position: center;  /* ← 常に中央 */
        background-repeat: no-repeat; /* ← 繰り返しなし */
    }
</style>
</head>

<body>

<div id="viewer"></div>

<script>
    const pages = ['真姫ちゃん_Miel//page_1.jpg', '真姫ちゃん_Miel//page_10.jpg', '真姫ちゃん_Miel//page_11.jpg', '真姫ちゃん_Miel//page_12.jpg', '真姫ちゃん_Miel//page_13.jpg', '真姫ちゃん_Miel//page_14.jpg', '真姫ちゃん_Miel//page_15.jpg', '真姫ちゃん_Miel//page_16.jpg', '真姫ちゃん_Miel//page_17.jpg', '真姫ちゃん_Miel//page_18.jpg', '真姫ちゃん_Miel//page_19.jpg', '真姫ちゃん_Miel//page_2.jpg', '真姫ちゃん_Miel//page_20.jpg', '真姫ちゃん_Miel//page_21.jpg', '真姫ちゃん_Miel//page_22.jpg', '真姫ちゃん_Miel//page_23.jpg', '真姫ちゃん_Miel//page_24.jpg', '真姫ちゃん_Miel//page_3.jpg', '真姫ちゃん_Miel//page_4.jpg', '真姫ちゃん_Miel//page_5.jpg', '真姫ちゃん_Miel//page_6.jpg', '真姫ちゃん_Miel//page_7.jpg', '真姫ちゃん_Miel//page_8.jpg', '真姫ちゃん_Miel//page_9.jpg'];
    let index = 0;

    const viewer = document.getElementById("viewer");
    viewer.style.backgroundImage = `url(${pages[0]})`;

    document.body.addEventListener("click", () => {
        index = (index + 1) % pages.length;
        viewer.style.backgroundImage = `url(${pages[index]})`; 
    });
</script>

</body>
</html>
