<title>Menu</title>
<style>
    body {
        margin: 0;
        background: black;
        color: white;
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: flex-start;    /*全体を上寄せ*/
        min-height: 100vh;
        padding: 20px;
    }

    .menu {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));    /*複数列にするのに必要*/
        gap: 20px;    /*サムネイル同士の間隔*/
        width: 100%;
        max-width: 900px;
    }

    .item {
        background: #111;
        padding: 15px;
        border-radius: 10px;
        text-align: center;
        transition: 0.2s;
        text-decoration: none;
        color: white;
    }

    .item:hover {
        background: #222;
    }

    .thumb {
        width: 100%;
        height: 500px;      /*サムネイルの高さ*/
        object-fit: cover;
        border-radius: 8px;
    }

    .title {
        margin-top: 8px;
        font-size: 18px;
        display: block;
    }
</style>
</head>
