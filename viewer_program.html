
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
    body {
        margin : 0; 
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    img{
        max-width : 100%;
        max-height : 100%;
    }
</style>
</head>

<body>

<img id="viewer" src="image_folder//page_1.jpg">

<script>
    const pages = ['image_folder//page_1.jpg', 'image_folder//page_2.jpg', 'image_folder//page_3.jpg'];
    let index = 0;

    document.body.addEventListener("click", () => {
        index = (index + 1) % pages.length;
        document.getElementById("viewer").src = pages[index];
    });
</script>

</body>
</html>
