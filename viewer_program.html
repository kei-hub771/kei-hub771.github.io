<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: black;
        overflow: hidden;
    }

    #viewer {
        width: 100%;
        height: 100%;
        background-size: contain;     /* ← 見切れない最大サイズ */
        background-position: center;  /* ← 中央に配置 */
        background-repeat: no-repeat; /* ← 余計な繰り返しなし */
    }
</style>
</head>

<body>

<div id="viewer"></div>

<script>
    const pages = [
        'image_folder/page_1.jpg',
        'image_folder/page_2.jpg',
        'image_folder/page_3.jpg'
    ];
    let index = 0;

    const viewer = document.getElementById("viewer");
    viewer.style.backgroundImage = `url(${pages[0]})`;

    document.body.addEventListener("click", () => {
        index = (index + 1) % pages.length;
        viewer.style.backgroundImage = `url(${pages[index]})`;
    });
</script>

</body>
</html>
