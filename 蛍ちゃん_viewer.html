
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
    body {
        margin: 0;
        background: black;
        height: 100vh;
        display: flex;
        justify-content: center;   
        align-items: center;       
    }
    img {
        max-width: 100%;
        max-height: 100%;
        display: block;
    }

</style>
</head>

<body>

<img id="viewer" src="image_folder//page_1.jpg">

<script>
    const pages = ['蛍ちゃん//page_1.jpg', '蛍ちゃん//page_2.jpg', '蛍ちゃん//page_3.jpg'];
    let index = 0;

    document.body.addEventListener("click", () => {
        index = (index + 1) % pages.length;
        document.getElementById("viewer").src = pages[index];
    });
</script>

</body>
</html>
